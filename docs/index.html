<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapGuessr</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- サイトロゴ（常時表示） -->
    <div id="site-logo">
        <!-- TODO: ロゴ画像ができたらimgタグで差し替え。 -->
        <span id="logo-dummy">&#127962; MapGuessr</span>
    </div>

    <!-- ラウンドセレクター画面 -->
    <div id="round-select-screen">
        <div class="select-container">
            <h1>MapGuessr</h1>
            <p>ラウンド数を選んでください</p>
            <div class="round-buttons">
                <button class="round-btn" data-rounds="1">1</button>
                <button class="round-btn" data-rounds="5">5</button>
                <button class="round-btn" data-rounds="10">10</button>
                <button class="round-btn" data-rounds="20">20</button>
                <button class="round-btn" data-rounds="50">50</button>
                <button class="round-btn" data-rounds="100">100</button>
            </div>
            <button id="btn-change-key">APIキーを変更</button>
            <p id="version-info">version 0.0.1 (2026.3.22)</p>
        </div>
    </div>

    <!-- メインゲーム画面 -->
    <div id="game-screen" style="display:none;">
        <div id="street-view"></div>

        <div id="status-bar">
            <span id="round-info">Round 1 / 5</span>
            <span id="total-score-info">Score: 0</span>
            <span id="timer-info">0s</span>
        </div>

        <!-- コンパス -->
        <div id="compass" style="display:none;">
            <svg id="compass-svg" width="52" height="52" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="22" fill="rgba(0,0,0,0.65)" stroke="rgba(255,255,255,0.3)"
                    stroke-width="1.5" />
                <text x="24" y="10" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-weight="bold"
                    font-family="sans-serif">N</text>
                <text x="24" y="42" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7"
                    font-family="sans-serif">S</text>
                <text x="9" y="27" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7"
                    font-family="sans-serif">W</text>
                <text x="39" y="27" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7"
                    font-family="sans-serif">E</text>
                <g id="compass-needle">
                    <polygon points="24,7 21,24 24,21 27,24" fill="#e94560" />
                    <polygon points="24,41 21,24 24,27 27,24" fill="#aaa" />
                </g>
            </svg>
        </div>

        <!-- ストリートビュー操作コントロール（左下） -->
        <div id="sv-controls">
            <!-- Col1: ズームイン  /  Col2: 移動を戻す -->
            <button id="btn-sv-zoom-in" class="sv-btn" title="ズームイン">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button id="btn-move-back" class="sv-btn sv-btn-nomove" title="移動を戻す (Z)" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 14 4 9 9 4"></polyline>
                    <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
                </svg>
            </button>
            <!-- Col1: ズームアウト  /  Col2: チェックポイント -->
            <button id="btn-sv-zoom-out" class="sv-btn" title="ズームアウト">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button id="btn-checkpoint" class="sv-btn sv-btn-nomove" title="チェックポイントを設定 (C)">
                <!-- チェックポイント未設定: フラグアイコン -->
                <svg id="icon-cp-unset" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                    <line x1="4" y1="22" x2="4" y2="15"></line>
                </svg>
                <!-- チェックポイント設定済: ターゲットアイコン -->
                <svg id="icon-cp-set" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" style="display:none;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                    <line x1="22" y1="12" x2="19.5" y2="12"></line>
                    <line x1="4.5" y1="12" x2="2" y2="12"></line>
                    <line x1="12" y1="2" x2="12" y2="4.5"></line>
                    <line x1="12" y1="19.5" x2="12" y2="22"></line>
                </svg>
            </button>
            <!-- Col1: タイトルに戻る  /  Col2: スタート地点に戻る -->
            <button id="btn-return-title" class="sv-btn" title="タイトルに戻る">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
            <button id="btn-return-start" class="sv-btn sv-btn-nomove" title="スタート地点に戻る (R)">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
        </div>

        <div id="map-wrapper">
            <div id="map-header">
                <div id="map-size-controls">
                    <button id="btn-size-up" title="拡大">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="19" x2="5" y2="5"></line>
                            <polyline points="5 12 5 5 12 5"></polyline>
                        </svg>
                    </button>
                    <button id="btn-size-down" title="縮小">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="5" x2="19" y2="19"></line>
                            <polyline points="12 19 19 19 19 12"></polyline>
                        </svg>
                    </button>
                    <button id="btn-pin" title="固定">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="17" x2="12" y2="22"></line>
                            <path
                                d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="map-container">
                <div id="guess-map"></div>
                <div id="map-zoom-controls">
                    <button id="btn-zoom-in">+</button>
                    <button id="btn-zoom-out">−</button>
                </div>
            </div>
            <div id="map-footer">
                <button id="btn-guess" disabled>Guess</button>
            </div>
        </div>

        <div id="result-panel" style="display:none;">
            <div id="result-content">
                <p id="result-distance"></p>
                <p id="result-score"></p>
                <p id="result-total"></p>
                <p id="result-time"></p>
                <button id="btn-next">Next Round</button>
            </div>
        </div>
    </div>

    <!-- ゲーム終了画面 -->
    <div id="end-screen" style="display:none;">
        <div class="select-container">
            <h1>ゲーム終了</h1>
            <p id="end-total-score"></p>
            <p id="end-avg-distance"></p>
            <div id="round-results-table"></div>
            <button id="btn-restart" class="round-btn">もう一度プレイ</button>
        </div>
    </div>

    <!-- エラー表示 -->
    <div id="error-screen" style="display:none;">
        <div class="select-container">
            <h1>エラー</h1>
            <p id="error-message">ストリートビューが見つかりませんでした。ページをリロードしてください。</p>
        </div>
    </div>

    <!-- セットアップ画面（初回・APIキー変更時） -->
    <div id="setup-screen" style="display:none;">
        <div class="select-container">
            <h1>MapGuessr</h1>
            <p>Google Maps API キーを入力してください</p>
            <input type="text" id="api-key-input" placeholder="AIzaSy..." autocomplete="off" spellcheck="false">
            <button id="btn-save-key" class="round-btn">保存して開始</button>
            <p class="setup-note">入力したキーはこのブラウザの localStorage にのみ保存されます。</p>
        </div>
    </div>

    <!-- ゲームロジック（Maps API の動的ロードも含む） -->
    <script src="script.js"></script>

</body>

</html>
